name: Sync LinkedIn Profile

on:
  # Run weekly every Monday at 6:00 AM UTC (2:00 PM Malaysia)
  schedule:
    - cron: '0 6 * * 1'
  
  # Allow manual trigger from GitHub Actions tab
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  sync:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: |
          npm ci
          npx puppeteer browsers install chrome

      - name: Run LinkedIn sync
        env:
          LINKEDIN_COOKIE: ${{ secrets.LINKEDIN_COOKIE }}
        run: node scripts/sync-linkedin.mjs
        continue-on-error: false

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet public/data/profile.json || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "LinkedIn Sync Bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/profile.json
          git commit -m "🔄 Auto-sync LinkedIn profile data [$(date -u '+%Y-%m-%d')]"
          git push
